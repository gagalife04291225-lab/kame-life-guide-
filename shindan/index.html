let selectedRoute = null;
let currentQuestionIndex = 0;
let scores = {};
let result = null;
let answerHistory = [];

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function initStart() {
  var container = document.getElementById('route-cards');
  container.innerHTML = '';
  ROUTES.forEach(function(route) {
    var card = document.createElement('button');
    card.className = 'route-card';
    card.dataset.id = route.id;
    card.innerHTML = '<span class="route-emoji">' + route.emoji + '</span>' +
      '<div class="route-info"><div class="route-name">' + route.name + '</div>' +
      '<div class="route-desc">' + route.desc + '</div></div>' +
      '<div class="route-q">' + route.qCount + '問</div>';
    card.addEventListener('click', function(){ selectRoute(route.id); });
    container.appendChild(card);
  });
}

function selectRoute(id) {
  selectedRoute = ROUTES.find(function(r){ return r.id === id; });
  document.querySelectorAll('.route-card').forEach(function(c){
    c.classList.toggle('selected', c.dataset.id === id);
  });
  var btn = document.getElementById('btn-start');
  btn.disabled = false;
  btn.textContent = '「' + selectedRoute.name + '」で診断スタート';
}

function startQuiz() {
  if (!selectedRoute) return;
  currentQuestionIndex = 0;
  scores = {};
  answerHistory = [];
  show('screen-quiz');
  showQuestion();
}

function showQuestion() {
  var route = selectedRoute;
  var q = route.questions[currentQuestionIndex];
  var total = route.questions.length;
  document.getElementById('progress-label').textContent = (currentQuestionIndex + 1) + ' / ' + total;
  var pct = (currentQuestionIndex / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('route-badge').textContent = route.emoji + ' ' + route.name;
  document.getElementById('question-text').textContent = q.text;
  var container = document.getElementById('choices');
  container.innerHTML = '';
  q.choices.forEach(function(choice) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.label;
    btn.addEventListener('click', function(){ selectChoice(choice); });
    container.appendChild(btn);
  });
}

function selectChoice(choice) {
  answerHistory.push({ questionIndex: currentQuestionIndex, scores: choice.scores });
  Object.entries(choice.scores).forEach(function(entry){
    var key = entry[0]; var val = entry[1];
    scores[key] = (scores[key] || 0) + val;
  });
  currentQuestionIndex++;
  if (currentQuestionIndex < selectedRoute.questions.length) {
    showQuestion();
  } else {
    calcResult();
  }
}

function calcResult() {
  document.getElementById('progress-fill').style.width = '100%';
  var candidates = selectedRoute.species;
  var matched = candidates.filter(function(sp){ return sp.match(scores); });
  var pool = matched.length > 0 ? matched : candidates;
  var best = pool[0];
  var bestScore = -Infinity;
  pool.forEach(function(sp){
    var s = sp.score(scores);
    if (s > bestScore) { bestScore = s; best = sp; }
  });
  result = best;
  showResult(best);
}

function showResult(sp) {
  document.getElementById('res-emoji').textContent = sp.emoji;
  document.getElementById('res-name').textContent = sp.name;
  document.getElementById('res-latin').textContent = sp.latin;
  document.getElementById('res-reason').textContent = sp.reason;
  var badges = document.getElementById('res-badges');
  badges.innerHTML = '';
  var diffClass = sp.difficulty.indexOf('入門') >= 0 ? 'badge-beginner'
                : sp.difficulty.indexOf('上級') >= 0 ? 'badge-advanced' : 'badge-intermediate';
  badges.innerHTML += '<span class="badge ' + diffClass + '">' + sp.difficulty + '</span>';
  badges.innerHTML += '<span class="badge badge-intermediate">' + sp.size + '</span>';
  if (sp.cites) badges.innerHTML += '<span class="badge badge-cites">' + sp.cites + '</span>';
  var legalBox = document.getElementById('res-legal');
  if (sp.legal === 'cites') {
    legalBox.style.display = '';
    legalBox.className = 'legal-box';
    legalBox.textContent = '⚠️ この種はCITES IIです。国内で合法的に流通しているCB個体（国内繁殖個体）には取引証明書が発行されます。購入時は書類の有無を必ず確認してください。';
  } else {
    legalBox.style.display = 'none';
  }
  var specGrid = document.getElementById('res-specs');
  specGrid.innerHTML = '';
  Object.entries(sp.specs).forEach(function(entry){
    specGrid.innerHTML += '<div class="spec-item"><div class="spec-label">' + entry[0] + '</div><div class="spec-value">' + entry[1] + '</div></div>';
  });
  var linksDiv = document.getElementById('res-links');
  linksDiv.innerHTML = '';
  sp.links.forEach(function(l){
    linksDiv.innerHTML += '<a href="' + l.href + '" class="art-link" target="_blank" rel="noopener noreferrer">' + l.label + '</a>';
  });
  if (sp.asin) {
    linksDiv.innerHTML += '<a href="https://www.amazon.co.jp/dp/' + sp.asin + '?tag=kamelife09-22" class="amazon-link" target="_blank" rel="noopener noreferrer">Amazon で関連商品を見る</a>';
  }
  show('screen-result');
}

document.getElementById('btn-back').addEventListener('click', function(){
  if (currentQuestionIndex === 0) {
    show('screen-start');
  } else {
    currentQuestionIndex--;
    var removed = answerHistory.pop();
    Object.entries(removed.scores).forEach(function(entry){
      scores[entry[0]] = (scores[entry[0]] || 0) - entry[1];
    });
    showQuestion();
  }
});

document.getElementById('btn-retry').addEventListener('click', function(){
  selectedRoute = null;
  document.querySelectorAll('.route-card').forEach(function(c){ c.classList.remove('selected'); });
  var btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = 'ルートを選んで診断スタート';
  show('screen-start');
});

document.getElementById('btn-share').addEventListener('click', function(){
  if (!result) return;
  var text = '【亀診断】私に合う亀は「' + result.name + '」でした！🐢 #亀診断 #カメライフガイド';
  var url = 'https://gagalife04291225-lab.github.io/kame-life-guide-/shindan/';
  if (navigator.share) {
    navigator.share({ title: 'あなたに合う亀診断', text: text, url: url }).catch(function(){});
  } else {
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url), '_blank', 'noopener,noreferrer');
  }
});

document.getElementById('btn-start').addEventListener('click', startQuiz);
document.addEventListener('DOMContentLoaded', initStart);
initStart();
</script>
