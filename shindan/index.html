<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亀診断ツール メンテナンス中 | カメライフガイド</title>
<meta name="description" content="亀・リクガメ診断ツールは現在メンテナンス中です。再開まで飼育ガイド・比較ページをご利用ください。">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --forest-deep:#0d1f1a;--forest:#2f4a3c;--parchment:#f4efe2;
  --accent-gold:#C9A96B;--bg-primary:#081411;--radius-lg:16px;--radius-pill:9999px;
}
html{scroll-behavior:smooth;}
body{font-family:"Noto Serif JP",serif;background:var(--parchment);color:var(--forest-deep);min-height:100vh;display:flex;flex-direction:column;}

/* ── Mini Nav ── */
.mini-nav{background:rgba(5,14,7,.92);padding:0 16px;height:44px;display:flex;align-items:center;border-bottom:1px solid rgba(201,169,107,.14);}
.mini-nav-inner{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;width:100%;max-width:900px;margin:0 auto;}
.mini-nav-inner::-webkit-scrollbar{display:none;}
.mini-nav-logo{font-family:"Playfair Display",serif;font-weight:700;font-size:.78rem;letter-spacing:.16em;color:rgba(201,169,107,.72);text-decoration:none;padding-right:14px;border-right:1px solid rgba(255,255,255,.12);margin-right:10px;white-space:nowrap;}
.mini-nav-logo:hover{color:var(--accent-gold);}
.mini-nav-link{font-family:"Noto Serif JP",serif;font-size:.74rem;font-weight:700;color:rgba(200,215,205,.60);text-decoration:none;padding:0 10px;height:44px;line-height:44px;white-space:nowrap;transition:color .18s;}
.mini-nav-link:hover{color:rgba(201,169,107,.88);}
@media(max-width:680px){.mini-nav-logo{display:none;}}

/* ── Main ── */
.mnt-main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px;}
.mnt-card{background:#fff;border:1.5px solid #e2dbc8;border-radius:var(--radius-lg);padding:40px 32px 36px;max-width:520px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(8,20,17,.07);}
.mnt-icon{font-size:2.8rem;margin-bottom:16px;display:block;}
.mnt-title{font-family:"Playfair Display",serif;font-weight:700;font-size:clamp(1.30rem,4vw,1.70rem);color:var(--forest-deep);margin-bottom:16px;line-height:1.3;}
.mnt-body{font-size:.92rem;color:#4a6058;line-height:1.90;margin-bottom:28px;}
.mnt-divider{border:none;border-top:1px solid #e2dbc8;margin:24px 0;}
.mnt-label{font-size:.68rem;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--accent-gold);display:block;margin-bottom:16px;}
.mnt-links{display:flex;flex-direction:column;gap:10px;}
.mnt-link{display:flex;align-items:center;gap:10px;text-decoration:none;background:var(--parchment);border:1.5px solid #ddd5bf;border-radius:12px;padding:14px 16px;color:var(--forest-deep);font-size:.88rem;font-weight:700;transition:border-color .20s,transform .18s;}
.mnt-link:hover{border-color:rgba(201,169,107,.44);transform:translateX(3px);}
.mnt-link-icon{font-size:1.20rem;flex-shrink:0;}
.mnt-link-text{text-align:left;}
.mnt-link-sub{font-size:.72rem;color:rgba(47,74,60,.52);font-weight:400;display:block;margin-top:2px;}
@media(max-width:480px){.mnt-card{padding:28px 18px 24px;}.mnt-links{gap:8px;}}
</style>
</head>
<body>

<nav class="mini-nav">
  <div class="mini-nav-inner">
    <a href="../" class="mini-nav-logo">KAME LIFE</a>
    <a href="../species-list.html" class="mini-nav-link">種一覧</a>
    <a href="../compare/" class="mini-nav-link">比較</a>
    <a href="../guides/" class="mini-nav-link">ガイド</a>
  </div>
</nav>

<main class="mnt-main">
  <div class="mnt-card">
    <span class="mnt-icon">🔧</span>
    <h1 class="mnt-title">亀診断ツールは<br>メンテナンス中です</h1>
    <p class="mnt-body">
      より正確な診断結果を表示するため、診断エンジンを調整しています。<br>
      再開まで、種別ページ・飼育ガイド・比較ページをご覧ください。
    </p>
    <hr class="mnt-divider">
    <span class="mnt-label">メンテナンス中の代替ページ</span>
    <div class="mnt-links">
      <a href="../species-list.html" class="mnt-link">
        <span class="mnt-link-icon">🐢</span>
        <span class="mnt-link-text">
          種一覧を見る
          <span class="mnt-link-sub">100種以上の亀・リクガメを一覧で確認</span>
        </span>
      </a>
      <a href="../compare/" class="mnt-link">
        <span class="mnt-link-icon">⚖️</span>
        <span class="mnt-link-text">
          比較ページを見る
          <span class="mnt-link-sub">気になる種を並べて比較</span>
        </span>
      </a>
      <a href="../guides/" class="mnt-link">
        <span class="mnt-link-icon">📖</span>
        <span class="mnt-link-text">
          飼育ガイドを見る
          <span class="mnt-link-sub">UVB・フィルター・温度管理・餌ガイド</span>
        </span>
      </a>
      <a href="../" class="mnt-link">
        <span class="mnt-link-icon">🏠</span>
        <span class="mnt-link-text">
          トップページに戻る
          <span class="mnt-link-sub">カメライフガイド ホーム</span>
        </span>
      </a>
    </div>
  </div>
</main>

</body>
</html>
