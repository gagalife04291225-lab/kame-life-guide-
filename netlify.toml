<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="カメ飼育専門情報サイト。ケージ・床材・シェルター・餌・UVBライトなど飼育器具を徹底比較レビュー。Amazonで買える厳選アイテムをプロ視点で解説。">
  <title>カメライフガイド — 飼育器具・餌の専門レビューサイト</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  --forest:    #1c2b1a;
  --forest-mid:#2d4a2a;
  --moss:      #4a6741;
  --sage:      #7a9e6e;
  --sage-light:#a8c49a;
  --stone:     #e8e2d8;
  --parchment: #f4f0e8;
  --cream:     #faf8f4;
  --white:     #ffffff;
  --ink:       #1a1a16;
  --ink-soft:  #3d3d30;
  --muted:     #8a8878;
  --border:    rgba(74,103,65,0.15);
  --amazon:    #FF9900;
  --amazon-dk: #e08800;
  --ease:      cubic-bezier(0.25,0.1,0.25,1);
  --ease-out:  cubic-bezier(0.0,0.0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.75;
  overflow-x: hidden;
}

/* ── REVEAL ── */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.75s var(--ease-out), transform 0.75s var(--ease-out); }
.reveal.visible { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }

/* ── HEADER ── */
.site-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  transition: background 0.4s var(--ease), box-shadow 0.4s;
}
.site-header.scrolled {
  background: rgba(28,43,26,0.96);
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--cream);
  text-decoration: none;
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--sage);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.nav-links {
  display: flex; align-items: center; gap: 32px; list-style: none;
}
.nav-links a {
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.6); text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--sage-light); }
.nav-cta {
  background: var(--sage) !important; color: white !important;
  padding: 9px 22px; border-radius: 3px;
  font-size: 11px !important; letter-spacing: 0.16em;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--moss) !important; }

/* ── HERO ── */
.hero {
  min-height: 100svh;
  background: var(--forest);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0 0 80px;
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(74,103,65,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 70%, rgba(45,74,42,0.3) 0%, transparent 60%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
}

.hero-content {
  position: relative; z-index: 2;
  max-width: 1200px; margin: 0 auto; width: 100%;
  padding: 0 48px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end;
}

.hero-left {}

.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--sage-light);
  margin-bottom: 28px;
  border: 1px solid rgba(122,158,110,0.35);
  padding: 6px 16px; border-radius: 2px;
}
.hero-tag-dot {
  width: 5px; height: 5px; background: var(--sage); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(44px, 5.5vw, 80px);
  font-weight: 700;
  line-height: 1.06; letter-spacing: -0.02em;
  color: var(--cream);
  margin-bottom: 28px;
}
.hero-title em { font-style: italic; color: var(--sage-light); }

.hero-desc {
  font-size: 15px; line-height: 1.9;
  color: rgba(244,240,232,0.55);
  max-width: 400px; margin-bottom: 44px;
}

.hero-buttons { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--sage); color: var(--forest);
  text-decoration: none; padding: 15px 32px; border-radius: 3px;
  font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
  transition: background 0.2s, transform 0.2s;
}
.btn-primary:hover { background: var(--sage-light); transform: translateY(-2px); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
  text-decoration: none; padding: 15px 28px; border-radius: 3px;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  transition: border-color 0.2s, color 0.2s, gap 0.2s;
}
.btn-outline:hover { border-color: var(--sage); color: var(--sage-light); gap: 12px; }
.btn-outline::after { content: '→'; }

.hero-right {
  display: flex; flex-direction: column; gap: 16px; align-items: flex-start;
}

.hero-stat {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  padding: 20px 28px; border-radius: 4px;
  width: 100%;
}
.hero-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 600;
  color: var(--cream); line-height: 1;
  margin-bottom: 4px;
}
.hero-stat-num span { font-size: 18px; color: var(--sage-light); }
.hero-stat-label { font-size: 12px; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); text-transform: uppercase; }

.hero-scroll {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.3); z-index: 2;
}
.scroll-arrow {
  width: 1px; height: 40px; background: linear-gradient(var(--sage), transparent);
  position: relative; overflow: hidden;
}
.scroll-arrow::after {
  content: ''; position: absolute; top: -100%; left: 0;
  width: 1px; height: 100%; background: var(--sage-light);
  animation: scrollDown 1.8s ease-in-out infinite;
}
@keyframes scrollDown { 0%{top:-100%} 100%{top:200%} }

/* ── BAND ── */
.stat-band {
  background: var(--forest-mid);
  padding: 0; overflow: hidden;
  border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.stat-band-inner {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr);
  divide-x: 1px solid rgba(255,255,255,0.06);
}
.stat-item {
  padding: 32px 40px;
  border-right: 1px solid rgba(255,255,255,0.06);
  text-align: center;
}
.stat-item:last-child { border-right: none; }
.stat-n {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 600; color: var(--cream); line-height: 1;
  margin-bottom: 6px;
}
.stat-n span { color: var(--sage-light); font-size: 20px; }
.stat-l { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); }

/* ── SECTIONS ── */
section { padding: 96px 48px; }
.section-inner { max-width: 1200px; margin: 0 auto; }

.section-label {
  font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--moss); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::before { content: ''; width: 28px; height: 1px; background: var(--sage); }

.section-heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 3.5vw, 52px); font-weight: 600;
  line-height: 1.12; color: var(--forest); margin-bottom: 16px;
}
.section-heading em { font-style: italic; color: var(--moss); }
.section-sub { font-size: 14px; color: var(--muted); line-height: 1.9; max-width: 500px; }

/* ── RANKING ── */
.ranking-section { background: var(--white); }
.ranking-head { margin-bottom: 60px; }

.rank-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
  border: 1px solid var(--border);
}
.rank-card {
  padding: 48px 40px;
  border-right: 1px solid var(--border);
  text-decoration: none; color: inherit;
  display: block; position: relative; overflow: hidden;
  transition: background 0.3s;
}
.rank-card:last-child { border-right: none; }
.rank-card:hover { background: var(--parchment); }
.rank-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.rank-card:nth-child(1)::before { background: #b8860b; }
.rank-card:nth-child(2)::before { background: #909090; }
.rank-card:nth-child(3)::before { background: #8b5a2b; }

.rank-num {
  font-family: 'Playfair Display', serif;
  font-size: 72px; font-weight: 700; line-height: 1;
  margin-bottom: 20px; display: block;
}
.rank-card:nth-child(1) .rank-num { color: rgba(184,134,11,0.15); }
.rank-card:nth-child(2) .rank-num { color: rgba(144,144,144,0.12); }
.rank-card:nth-child(3) .rank-num { color: rgba(139,90,43,0.12); }

.rank-medal {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 14px; display: block;
}
.rank-card:nth-child(1) .rank-medal { color: #b8860b; }
.rank-card:nth-child(2) .rank-medal { color: #909090; }
.rank-card:nth-child(3) .rank-medal { color: #8b5a2b; }

.rank-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px; font-weight: 600; line-height: 1.45;
  color: var(--forest); margin-bottom: 12px;
}
.rank-desc { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 18px; }
.rank-stars { color: var(--sage); letter-spacing: 4px; font-size: 13px; }

.rank-arrow {
  position: absolute; bottom: 36px; right: 36px;
  font-size: 20px; color: var(--sage); opacity: 0;
  transform: translateX(-8px); transition: opacity 0.3s, transform 0.3s;
}
.rank-card:hover .rank-arrow { opacity: 1; transform: none; }

/* ── ARTICLES ── */
.articles-section { background: var(--parchment); }
.articles-header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 52px; gap: 20px;
}
.view-all {
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--moss); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
  transition: gap 0.2s, color 0.2s; white-space: nowrap;
}
.view-all:hover { gap: 14px; color: var(--forest); }
.view-all::after { content: '→'; }

.article-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
}
.article-card {
  background: var(--white); text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
}
.article-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 16px 48px rgba(28,43,26,0.1);
}

.card-top {
  aspect-ratio: 16/10; position: relative; overflow: hidden;
}
.card-bg {
  width: 100%; height: 100%;
  transition: transform 0.5s var(--ease);
}
.article-card:hover .card-bg { transform: scale(1.06); }
.card-bg.bg-cage     { background: linear-gradient(135deg, #2d4a2a 0%, #1c3520 50%, #142810 100%); }
.card-bg.bg-substrate{ background: linear-gradient(135deg, #6b5a3a 0%, #4a3d25 50%, #332a18 100%); }
.card-bg.bg-shelter  { background: linear-gradient(135deg, #3a4a35 0%, #2a3828 50%, #1c2818 100%); }
.card-bg.bg-feed     { background: linear-gradient(135deg, #4a5a2a 0%, #384420 50%, #283015 100%); }
.card-bg.bg-uvb      { background: linear-gradient(135deg, #2a3a5a 0%, #1c2840 50%, #121c30 100%); }
.card-bg.bg-water    { background: linear-gradient(135deg, #2a4a5a 0%, #1c3840 50%, #122830 100%); }

.card-icon {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 56px;
  transition: transform 0.4s var(--ease);
}
.article-card:hover .card-icon { transform: translate(-50%, -56%) scale(1.1); }

.card-label {
  position: absolute; top: 14px; left: 14px;
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  background: rgba(28,43,26,0.75); color: var(--sage-light);
  padding: 5px 12px; backdrop-filter: blur(6px);
}

.card-body { padding: 24px 24px 28px; flex: 1; display: flex; flex-direction: column; }
.card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px; font-weight: 600; line-height: 1.55;
  color: var(--forest); margin-bottom: 10px;
  transition: color 0.2s;
}
.article-card:hover .card-title { color: var(--moss); }
.card-excerpt { font-size: 13px; color: var(--muted); line-height: 1.85; flex: 1; margin-bottom: 16px; }
.card-meta {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--sage); display: flex; align-items: center; gap: 8px;
}
.card-meta::before { content: ''; width: 20px; height: 1px; background: var(--sage); }

/* ── DEEP FEATURE ── */
.feature-section {
  background: var(--forest);
  padding: 100px 48px;
}
.feature-inner {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center;
}
.feature-visual {
  position: relative;
}
.feature-panel {
  background: var(--forest-mid);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  position: relative; overflow: hidden;
}
.feature-panel::before {
  content: '🐢'; font-size: 160px;
  position: absolute; right: -20px; bottom: -20px;
  opacity: 0.08; line-height: 1;
}
.feature-items { display: flex; flex-direction: column; gap: 16px; }
.feature-item {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 18px; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}
.fi-icon {
  width: 40px; height: 40px; background: rgba(122,158,110,0.15);
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.fi-title { font-size: 14px; font-weight: 500; color: var(--cream); margin-bottom: 4px; }
.fi-desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.7; }

.feature-text .section-label { color: var(--sage-light); }
.feature-text .section-label::before { background: var(--sage); }
.feature-heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px,3vw,48px); font-weight: 600;
  color: var(--cream); line-height: 1.15; margin-bottom: 20px;
}
.feature-heading em { font-style: italic; color: var(--sage-light); }
.feature-body { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.95; margin-bottom: 36px; }
.feature-link {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--sage-light); text-decoration: none;
  border-bottom: 1px solid rgba(122,158,110,0.3);
  padding-bottom: 4px;
  transition: gap 0.2s, border-color 0.2s;
}
.feature-link:hover { gap: 16px; border-color: var(--sage-light); }

/* ── ARTICLE PAGE ── */
.article-hero {
  background: var(--forest);
  padding: 140px 48px 80px;
  position: relative; overflow: hidden;
}
.article-hero::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(74,103,65,0.2) 0%, transparent 70%);
}
.article-hero-inner { max-width: 840px; position: relative; z-index: 1; }
.article-badge {
  display: inline-block;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--sage-light);
  border: 1px solid rgba(122,158,110,0.35);
  padding: 6px 16px; margin-bottom: 28px;
}
.article-page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4vw, 52px); font-weight: 700;
  line-height: 1.18; color: var(--cream); margin-bottom: 24px;
}
.article-meta-row {
  font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em;
  display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
}
.article-meta-row span { display: flex; align-items: center; gap: 6px; }

.breadcrumb {
  background: var(--parchment);
  padding: 14px 48px;
  font-size: 12px; color: var(--muted);
  display: flex; gap: 8px; align-items: center;
  border-bottom: 1px solid var(--border);
}
.breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--moss); }

.article-body-wrap {
  max-width: 760px; margin: 0 auto; padding: 72px 48px 100px;
}
.article-body p {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; line-height: 2.1; color: var(--ink-soft); margin-bottom: 22px;
}
.article-body h2 {
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 600; color: var(--forest);
  margin: 60px 0 22px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.article-body h3 {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px; font-weight: 600; color: var(--forest-mid);
  margin: 40px 0 14px;
  padding-left: 14px; border-left: 3px solid var(--sage);
}
.article-body ul, .article-body ol {
  padding-left: 22px; margin-bottom: 22px;
}
.article-body li {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; line-height: 2; color: var(--ink-soft); margin-bottom: 8px;
}

/* Merit / Demerit */
.merit-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
@media (max-width: 600px) { .merit-box { grid-template-columns: 1fr; } }
.merit, .demerit { padding: 28px; }
.merit { background: #f2f8f0; border-top: 2px solid var(--sage); }
.demerit { background: #faf2f0; border-top: 2px solid #c47a5a; }
.merit h4 { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--moss); margin-bottom: 14px; }
.demerit h4 { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: #9a4a2a; margin-bottom: 14px; }
.merit ul, .demerit ul { padding-left: 18px; }
.merit li, .demerit li { font-size: 13px; line-height: 1.85; font-family: 'Noto Sans JP', sans-serif; }

/* Rating */
.rating-box { margin: 52px 0; background: var(--forest); padding: 52px; text-align: center; }
.rating-label { font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--sage-light); margin-bottom: 20px; }
.rating-num {
  font-family: 'Playfair Display', serif;
  font-size: 88px; font-weight: 700; color: var(--cream); line-height: 1; margin-bottom: 12px;
}
.rating-stars { font-size: 20px; color: var(--sage-light); letter-spacing: 6px; margin-bottom: 18px; }
.rating-comment { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.85; font-family: 'Noto Serif JP', serif; }

/* Amazon */
.amazon-placeholder {
  border: 1.5px dashed rgba(255,153,0,0.5);
  padding: 28px 32px; margin: 36px 0; background: #fffaf0;
}
.amazon-placeholder strong { display: block; font-size: 14px; font-weight: 600; color: #b07000; margin-bottom: 8px; }
.amazon-placeholder p { font-size: 13px; color: #9a7020; line-height: 1.7; font-family: 'Noto Sans JP', sans-serif; }

