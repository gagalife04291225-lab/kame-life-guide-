name: Rakuten OAuth Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run oauth test
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_APP_UUID: ${{ secrets.RAKUTEN_APP_UUID }}
        run: node scripts/diag-oauth.js > scripts/diag-oauth-result.txt 2>&1 || true
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/diag-oauth-result.txt
          git diff --cached --quiet || (git commit -m "diag: oauth test" && git push)
